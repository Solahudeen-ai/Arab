<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Portal | Arab Community of Lagos</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              emerald: '#046A38', 
              gold: '#D4AF37',
              midnight: '#0B1623',
            }
          },
          fontFamily: {
            heading: ['Outfit', 'sans-serif'],
            body: ['Plus Jakarta Sans', 'sans-serif'],
          }
        }
      }
    }
  </script>
</head>
<body class="bg-brand-midnight min-h-screen flex items-center justify-center relative overflow-hidden font-body p-4">

  <div class="absolute top-0 right-0 w-[500px] h-[500px] bg-brand-gold rounded-full mix-blend-screen filter blur-[150px] opacity-10 translate-x-1/3 -translate-y-1/4 pointer-events-none"></div>
  <div class="absolute bottom-0 left-0 w-[600px] h-[600px] bg-brand-emerald rounded-full mix-blend-screen filter blur-[150px] opacity-10 -translate-x-1/3 translate-y-1/3 pointer-events-none"></div>

  <div class="w-full max-w-md relative z-10">
    
    <div class="text-center mb-8">
      <a href="index.html" class="inline-block mb-4 hover:scale-105 transition-transform">
        <div class="w-16 h-16 rounded-2xl bg-white/10 backdrop-blur-md border border-white/20 flex items-center justify-center mx-auto shadow-lg">
          <i class="fa-solid fa-graduation-cap text-3xl text-brand-gold"></i>
        </div>
      </a>
      <h1 class="font-heading text-3xl font-bold text-white mb-2">Student Portal</h1>
      <p class="text-slate-400 text-sm">Arab Community of Lagos</p>
    </div>

    <div class="bg-white rounded-3xl shadow-2xl p-8 relative overflow-hidden border border-slate-100">
      <div class="absolute top-0 left-0 w-full h-1.5 bg-gradient-to-r from-brand-emerald to-brand-gold"></div>
      
      <form action="YOUR_CLASSES_360_LOGIN_URL_HERE" method="POST" class="space-y-5">
        
        <div>
          <label class="block text-sm font-bold text-slate-700 mb-1.5">Student Email</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400">
              <i class="fa-regular fa-envelope"></i>
            </div>
            <input type="email" name="email" required class="w-full pl-11 pr-4 py-3.5 rounded-xl border border-slate-200 focus:border-brand-emerald focus:ring-2 focus:ring-brand-emerald/20 outline-none transition-all text-sm text-slate-700" placeholder="student@example.com">
          </div>
        </div>

        <div>
          <label class="block text-sm font-bold text-slate-700 mb-1.5 flex justify-between">
            <span>Password</span>
            <a href="#" class="text-brand-emerald hover:text-brand-gold text-xs font-semibold transition-colors">Forgot?</a>
          </label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400">
              <i class="fa-solid fa-lock"></i>
            </div>
            <input type="password" name="password" required class="w-full pl-11 pr-4 py-3.5 rounded-xl border border-slate-200 focus:border-brand-emerald focus:ring-2 focus:ring-brand-emerald/20 outline-none transition-all text-sm text-slate-700" placeholder="••••••••">
          </div>
        </div>

        <button type="submit" class="w-full py-4 mt-2 bg-brand-emerald text-white font-bold rounded-xl hover:bg-brand-midnight transition-all shadow-md hover:shadow-lg flex items-center justify-center gap-2 group">
          <span>Enter Classroom 360</span>
          <i class="fa-solid fa-arrow-right-to-bracket group-hover:translate-x-1 transition-transform"></i>
        </button>

      </form>

      <div class="mt-8 pt-6 border-t border-slate-100 text-center">
        <p class="text-sm text-slate-500">
          Need technical support? <br>
          <a href="mailto:support@arablagos.com" class="text-brand-emerald font-semibold hover:underline">Contact the administration</a>
        </p>
      </div>
    </div>

    <div class="text-center mt-8">
      <p class="text-xs text-slate-500 font-medium tracking-wide uppercase">
        Directed by Abubakr Solah
      </p>
    </div>

  </div>
</body>
</html>
